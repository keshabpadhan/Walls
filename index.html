<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WALLS</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23111'/><text x='16' y='21' text-anchor='middle' font-family='-apple-system,Helvetica,Arial,sans-serif' font-size='13' font-weight='600' fill='white'>WLS</text></svg>">
  <link rel="stylesheet" href="styles.css">
  <style>
    .create-layout {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 24px;
      padding: 24px;
      padding-top: 68px;
      height: 100vh;
    }

    .preview-area {
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
      justify-content: center;
    }

    .preview-container {
      display: flex;
      gap: 20px;
      align-items: flex-end;
      justify-content: center;
    }

    .preview-wrap {
      position: relative;
    }

    .preview-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .preview-wrap canvas {
      border-radius: 16px;
      border: 2px solid var(--border);
      display: block;
      box-shadow: 0 2px 12px rgba(0,0,0,0.15);
    }

    .controls-panel {
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
      padding-right: 4px;
      padding-top: 44px;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .control-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .style-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .style-btn {
      background: var(--bg-card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 4px;
      cursor: pointer;
      transition: var(--transition);
      overflow: hidden;
    }

    .style-btn canvas {
      width: 100%;
      aspect-ratio: 16 / 10;
      border-radius: 10px;
      display: block;
    }

    .style-btn:hover { border-color: var(--text-muted); }
    .style-btn.active { border-color: var(--text); }

    .palette-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .palette-swatch {
      width: 36px;
      height: 36px;
      border-radius: 50px;
      border: 2px solid var(--border);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: var(--transition);
      padding: 0;
      background: none;
    }

    .palette-swatch span {
      flex: 1;
      display: block;
    }

    .palette-swatch:hover { border-color: var(--text-muted); }
    .palette-swatch.active { border-color: var(--text); }

    .mode-toggle {
      display: flex;
      gap: 6px;
    }

    .mode-btn {
      flex: 1;
      padding: 10px;
      border-radius: 50px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: var(--transition);
    }

    .mode-btn:hover { border-color: var(--text-muted); color: var(--text); }
    .mode-btn.active { background: var(--text); color: var(--bg); border-color: var(--text); }

    .mode-icon {
      width: 14px;
      height: 14px;
      border-radius: 50%;
    }

    .mode-icon-dark { background: #222; border: 1px solid #555; }
    .mode-icon-light { background: #eee; border: 1px solid #ccc; }

    .btn-shuffle {
      width: 100%;
      padding: 12px;
      border-radius: 50px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: var(--transition);
    }

    .btn-shuffle:hover { background: var(--bg-hover); border-color: var(--text-muted); }

    .export-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: auto;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .btn-export {
      width: 100%;
      padding: 12px;
      border-radius: 50px;
      border: none;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: var(--transition);
    }

    .btn-desktop { background: var(--text); color: var(--bg); }
    .btn-desktop:hover { opacity: 0.85; }
    .btn-mobile { background: var(--bg-card); color: var(--text); border: 1px solid var(--border) !important; }
    .btn-mobile:hover { background: var(--bg-hover); }

    .btn-apply {
      width: 100%;
      padding: 10px 20px;
      border-radius: 50px;
      border: none;
      background: var(--text);
      color: var(--bg);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: var(--transition);
      white-space: nowrap;
    }

    .btn-apply:hover { opacity: 0.85; }
    .btn-apply:disabled { opacity: 0.6; cursor: default; }

    .size-hint {
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      margin-top: -4px;
    }
  </style>
</head>
<body>

<nav data-tauri-drag-region>
  <div></div>

  <div class="nav-actions">
    <div class="nav-tabs">
      <button class="nav-tab active" id="themeDark" title="Dark" style="border: none; cursor: pointer;">

        </svg>
      </button>

  </div>
</nav>

<main>
  <div class="create-layout">
    <div class="preview-area">
      <div class="preview-container">
        <div class="preview-wrap">
          <div class="preview-label">Desktop</div>
          <canvas id="previewDesktop" width="640" height="360"></canvas>
        </div>
        <div class="preview-wrap">
          <div class="preview-label">Phone</div>
          <canvas id="previewMobile" width="145" height="314"></canvas>

      </div>
    </div>

    <div class="controls-panel">
      <div class="control-group">
        <div class="control-label">Pattern</div>
        <div class="style-grid" id="styleGrid"></div>
      </div>

      <div class="control-group">
        <div class="control-label">Palette</div>
        <div class="palette-row" id="paletteRow"></div>
      </div>

      <div class="control-group">
        <div class="control-label">Mode</div>
        <div class="mode-toggle">
          <button class="mode-btn active" id="btnDark">
            <span class="mode-icon mode-icon-dark"></span>
            Dark
          </button>
          <button class="mode-btn" id="btnLight">

            Light
          </button>
        </div>
      </div>

      <div class="control-group">
        <button class="btn-shuffle" id="btnShuffle">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <polyline points="23 4 23 10 17 10"></polyline>
            <polyline points="1 20 1 14 7 14"></polyline>
            <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15"></path>
          </svg>
          GENERATE VARIATION
        </button>
      </div>

      <div class="export-group">
        <!--<button class="btn-apply" id="btnApply">
          <svg width="14" height="14" viewBox="0 0 16 16" fill="none">
            <rect x="2" y="2" width="12" height="12" rx="2" stroke="currentColor" stroke-width="1.5"/>
            <path d="M2 11l3-3 2 2 4-4 3 3" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
          Set Wallpaper
        </button> -->

        <button class="btn-export btn-desktop" id="btnDesktop">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="2" y="3" width="12" height="9" rx="1"/><path d="M5 15h6M8 12v3"/></svg>
          Download Desktop
        </button>
        <div class="size-hint">3840 × 2160 px</div>

        <button class="btn-export btn-mobile" id="btnMobile">
          <svg width="16" height="16" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><rect x="4" y="1" width="8" height="14" rx="2"/><path d="M7.5 12.5h1"/></svg>
          Download Phone
        </button>
        <div class="size-hint">1290 × 2796 px</div>
      </div>
    </div>
  </div>
</main>

<script>
  function applyTheme(isDark) {
    const r = document.documentElement.style;
    if (isDark) {
      r.setProperty('--bg', '#0a0a0a');
      r.setProperty('--bg-card', '#151515');
      r.setProperty('--bg-hover', '#1e1e1e');
      r.setProperty('--bg-nav', 'rgba(15,15,15,0.85)');
      r.setProperty('--text', '#f0f0f0');
      r.setProperty('--text-muted', '#888');
      r.setProperty('--border', '#222');
    } else {
      r.setProperty('--bg', '#f0f0f0');
      r.setProperty('--bg-card', '#ffffff');
      r.setProperty('--bg-hover', '#e4e4e4');
      r.setProperty('--bg-nav', 'rgba(240,240,240,0.85)');
      r.setProperty('--text', '#111');
      r.setProperty('--text-muted', '#666');
      r.setProperty('--border', '#ddd');
    }
  }

  const saved = localStorage.getItem('walls-theme') || 'dark';
  applyTheme(saved === 'dark');
  if (saved === 'light') {
    document.getElementById('themeLight').classList.add('active');
    document.getElementById('themeDark').classList.remove('active');
  }

  document.getElementById('themeDark').onclick = () => {
    localStorage.setItem('walls-theme', 'dark');
    applyTheme(true);
    document.getElementById('themeDark').classList.add('active');
    document.getElementById('themeLight').classList.remove('active');
  };

  document.getElementById('themeLight').onclick = () => {
    localStorage.setItem('walls-theme', 'light');
    applyTheme(false);
    document.getElementById('themeLight').classList.add('active');
    document.getElementById('themeDark').classList.remove('active');
  };
</script>

<!-- Wallpaper engine + Create UI (inlined so it runs from file:// without a server) -->
<script>
(function () {
  'use strict';

  const DESKTOP_W = 3840, DESKTOP_H = 2160;
  const MOBILE_W = 1290, MOBILE_H = 2796;

  const PALETTES = [
    { name: 'Charcoal', colors: ['#000000','#141414','#2a2a2a','#404040','#595959','#737373','#8c8c8c','#b3b3b3','#d9d9d9','#ffffff'] },
    { name: 'Stone',    colors: ['#1a1714','#2c2825','#3e3a35','#534e47','#6b655c','#857d72','#9f9688','#b8b0a3','#d1c9bd','#ece6dc'] },
    { name: 'Blue',     colors: ['#01052b','#04137a','#0825c7','#0d39ff','#1552ff','#2f73ff','#58a3ff','#7dc3ff','#aedfff','#edf8ff'] },
    { name: 'Sunrise',  colors: ['#031c35','#05284a','#063862','#0b4b7a','#ff5b40','#ff7240','#ff9438','#ffb33f','#ffd064','#fff0c8'] },
    { name: 'Fire',     colors: ['#1a0000','#450000','#7a0000','#b30000','#e63900','#ff6a00','#ff9500','#ffb700','#ffd166','#fff1c2'] },
    { name: 'Purple',   colors: ['#100014','#22002e','#3f005a','#5c0085','#7a00b3','#9b1fff','#b84dff','#cf88ff','#e4c2ff','#f7ebff'] },
    { name: 'Toxic Glow', colors: ['#050807','#0c1410','#14221a','#1e3325','#2a4d2e','#3f6b2f','#5f8a2c','#86b326','#b9e83f','#f6ffe0'] },
    { name: 'Arctic Winter', colors: ['#081018','#112131','#1d3348','#33516a','#55768f','#7d9eb5','#a7c2d3','#cfe0ea','#e8f0f5','#ffffff']},
    { name: 'Neon Horizon', colors: ['#13051a','#290d3a','#3c1259','#3b2285','#2b42b0','#1d6cd4','#2ca1e8','#59cef2','#94f2f7','#e0fbfd'] },
    { name: 'Solar Flare', colors: ['#1f0505','#3a0d0d','#611111','#871c26','#ab3037','#cb4f41','#e6744a','#f79d5c','#fcc579','#fdf2a6'] },
    { name: 'Deep Forest', colors: ['#051214','#0b2426','#123a39','#18524c','#226b5d','#32856c','#49a07a','#68ba89','#91d49d','#c3ebd0'] },
    { name: 'Cosmic Blush Nebula', colors: ['#120414','#260824','#3f0f3d','#5c1a5c','#7a2a7a','#a33a86','#c85b98','#e98fb6','#ffd0dd','#fff1f6'] },
    { name: 'Ocean Depths', colors: ['#020c1b','#0a1628','#0f2847','#0d3b6e','#0e5a8a','#1a7fa0','#30a5b8','#5eccc5','#96ead8','#d4fff2'] },
    { name: 'Blood Moon', colors: ['#000000','#0f0000','#1f0000','#330000','#4d0000','#6b0000','#880000','#a50000','#c40000','#e60000'] },
  ];

  const PATTERNS = ['flowing-hills', 'smooth-wave', 'sand-dunes', 'mountains', 'concentric-arcs', 'desert-dunes'];
  const PATTERN_LABELS = ['Hills', 'Wave', 'Dunes', 'Mountains', 'Arcs', 'Scribble'];

  let _seed = 0;

  function mulberry32(a) {
    return function() {
      a |= 0; a = a + 0x6D2B79F5 | 0;
      var t = Math.imul(a ^ a >>> 15, 1 | a);
      t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
      return ((t ^ t >>> 14) >>> 0) / 4294967296;
    }
  }

  function noise(x) {
    const ix = Math.floor(x);
    const fx = x - ix;
    const t = fx * fx * (3 - 2 * fx);
    const seedA = Math.sin(ix * 127.1 + _seed * 0.01) * 43758.5453;
    const seedB = Math.sin((ix + 1) * 127.1 + _seed * 0.01) * 43758.5453;
    const a = seedA - Math.floor(seedA);
    const b = seedB - Math.floor(seedB);
    return a + (b - a) * t;
  }

  function fbm(x, octaves = 4) {
    let val = 0, amp = 0.5, freq = 1;
    for (let i = 0; i < octaves; i++) {
      val += amp * noise(x * freq);
      amp *= 0.5;
      freq *= 2.1;
    }
    return val;
  }

  function lerpColor(c1, c2, t) {
    const r1 = parseInt(c1.slice(1,3),16), g1 = parseInt(c1.slice(3,5),16), b1 = parseInt(c1.slice(5,7),16);
    const r2 = parseInt(c2.slice(1,3),16), g2 = parseInt(c2.slice(3,5),16), b2 = parseInt(c2.slice(5,7),16);
    return `rgb(${Math.round(r1+(r2-r1)*t)},${Math.round(g1+(g2-g1)*t)},${Math.round(b1+(b2-b1)*t)})`;
  }

  function getColor(palette, t, inv) {
    const colors = PALETTES[palette].colors;
    const ct = inv ? 1 - t : t;
    const idx = ct * (colors.length - 1);
    const i = Math.floor(idx);
    const f = idx - i;
    if (i >= colors.length - 1) return colors[colors.length - 1];
    if (i < 0) return colors[0];
    return lerpColor(colors[i], colors[i+1], f);
  }

  function getBgColor(palette, inv) {
    const colors = PALETTES[palette].colors;
    return inv ? colors[colors.length - 1] : colors[0];
  }

  function drawPineTree(ctx, x, bottomY, width, height, rng) {
    ctx.save();
    ctx.beginPath();
    ctx.moveTo(x - width * 0.08, bottomY);
    ctx.lineTo(x - width * 0.08, bottomY - height * 0.15);
    ctx.lineTo(x + width * 0.08, bottomY - height * 0.15);
    ctx.lineTo(x + width * 0.08, bottomY);
    ctx.fill();

    const segments = 30;
    for (let i = 0; i < segments; i++) {
      const t = i / (segments - 1);
      const segHeight = height * 1;
      const topY = bottomY - height + (segHeight * t * 0.45);
      const currBottomY = bottomY - height + (segHeight * (t + 0.22));
      const currWidth = width * (0.25 + t * 0.75);
      ctx.beginPath();
      ctx.moveTo(x, topY);
      const jitterL = (rng() - 0.5) * (width * 0.08);
      const jitterR = (rng() - 0.5) * (width * 0.08);
      ctx.lineTo(x - currWidth / 2 + jitterL, currBottomY);
      ctx.lineTo(x + currWidth / 2 + jitterR, currBottomY);
      ctx.closePath();
      ctx.fill();
    }
    ctx.restore();
  }

  function drawFlowingHills(ctx, w, h, pal, rng, inv) {
    const layers = 5;
    const isDesktop = w > h;
    for (let i = 0; i < layers; i++) {
      const t = (i + 1) / layers;
      const spacingFactor = isDesktop ? 0.40 : 0.33;
      const baseY = h * (0.5 + (i / layers) * spacingFactor);
      ctx.fillStyle = getColor(pal, t * 0.85 + 0.1, inv);
      ctx.beginPath();
      ctx.moveTo(0, h);
      let ridgePoints = [];
      const geometryStep = Math.max(4, Math.round(w / 120));
      for (let x = 0; x <= w + geometryStep; x += geometryStep) {
        const nx = x / w;
        let y;
        if (i < 2) {
          const mountainAmplitude = isDesktop ? 0.32 : 0.12;
          const mountainFreq = isDesktop ? 4.5 : 2.5;
          y = baseY + fbm(nx * mountainFreq + i * 4.5, 10) * h * mountainAmplitude - (isDesktop ? h * 0.12 : h * 0.05);
        } else {
          const hillAmplitude = isDesktop ? 0.16 : 0.06;
          const hillFreq = isDesktop ? 2.5 : 1.5;
          y = baseY + fbm(nx * hillFreq + i * 2.1, 8) * h * hillAmplitude - (isDesktop ? h * 0.01 : h * 0.02);
        }
        ridgePoints.push({ x, y });
        ctx.lineTo(x, y);
      }
      ctx.lineTo(w, h);
      ctx.lineTo(0, h);
      ctx.closePath();
      ctx.fill();

      if (i >= 1) {
        let baseTreeWidth, baseTreeHeight;
        if (isDesktop) {
          baseTreeWidth = h * (0.045 + i * 0.004);
          baseTreeHeight = baseTreeWidth * (1 + rng() * 0.2);
        } else {
          baseTreeWidth = w * (0.12 + i * 0.004);
          baseTreeHeight = baseTreeWidth * (1 + rng() * 0.2);
        }
        const stepX = baseTreeWidth * 0.35;
        for (let x = 0; x <= w; x += stepX) {
          const pct = x / w;
          const ptIndex = Math.floor(pct * (ridgePoints.length - 1));
          const pt = ridgePoints[ptIndex] || ridgePoints[ridgePoints.length - 1];
          const rowsDown = isDesktop
            ? (i === 1 ? 3 : 5 + (layers - i))
            : (i === 1 ? 1 : 2 + (layers - i));
          for (let row = 0; row < rowsDown; row++) {
            const yOffset = row * (baseTreeHeight * 0.22);
            const currentBottomY = pt.y + yOffset;
            if (currentBottomY > h + 20) continue;
            const scale = isDesktop ? (0.65 + rng() * 1.1) : (0.8 + rng() * 0.4);
            const currentWidth = baseTreeWidth * (isDesktop ? Math.min(scale, 1.1) : scale);
            const currentHeight = baseTreeHeight * scale;
            const currentX = x + (rng() - 0.5) * (stepX * 0.5);
            drawPineTree(ctx, currentX, currentBottomY, currentWidth, currentHeight, rng);
          }
        }
      }
    }
  }

  function drawSmoothWave(ctx, w, h, pal, rng, inv) {
    const layers = 8 + (rng() * 5 | 0);
    const centerX = w * (0.45 + rng() * 0.1);
    const baseY = h * (0.75 + rng() * 0.08);
    for (let i = layers; i >= 0; i--) {
      const t = i / layers;
      const spread = h * (0.8 + t * 1.8);
      const peakH = h * (0.05 + t * 0.3);
      const skew = rng() * 0.2 - 0.10;
      ctx.beginPath();
      ctx.moveTo(0, h);
      ctx.lineTo(0, baseY + peakH * 0.5);
      const steps = 120;
      for (let s = 0; s <= steps; s++) {
        const st = s / steps;
        const x = st * w;
        const dist = (x - centerX) / spread;
        const bell = Math.exp(-dist * dist * 0.4);
        const asymmetry = 1 + skew * dist;
        const wave = bell * peakH * asymmetry;
        const micro = fbm((x / h) * 2 + i * 1.4, 3) * h * 0.008;
        const y = baseY - wave + micro;
        ctx.lineTo(x, y);
      }
      ctx.lineTo(w, h);
      ctx.closePath();
      ctx.fillStyle = getColor(pal, 0.1 + (1 - t) * 0.8, inv);
      ctx.fill();
    }
  }

  function drawSandDunes(ctx, w, h, pal, rng, inv) {
    const layers = 7 + (rng() * 5 | 0);
    for (let i = 0; i < layers; i++) {
      const t = (i + 1) / layers;
      const baseY = h * (0.55 + t * 0.35);
      const freq = 0.5 + rng() * 0.8;
      const phase = rng() * 10;
      ctx.beginPath();
      for (let x = 0; x <= w; x += 2) {
        const nx = x / h;
        const wave = Math.sin(nx * Math.PI * freq + phase) * h * 0.05;
        const n = fbm(nx * 0.8 + i * 2.1, 3) * h * 0.05;
        const y = baseY + wave + n;
        if (x === 0) ctx.moveTo(x, y);
        else ctx.lineTo(x, y);
      }
      ctx.lineTo(w, h);
      ctx.lineTo(0, h);
      ctx.closePath();
      ctx.fillStyle = getColor(pal, t * 0.8 + 0.15, inv);
      ctx.fill();
    }
  }

  function drawMountains(ctx, w, h, pal, rng, inv) {
    const layers = 5 + (rng() * 3 | 0);
    for (let i = 0; i < layers; i++) {
      const t = (i + 1) / layers;
      const baseY = h * (0.55 + t * 0.35);
      const peakCount = 2 + (rng() * 2 | 0);
      const offset = rng() * 50;
      ctx.beginPath();
      ctx.moveTo(-2, h + 2);
      const peaks = [];
      for (let p = 0; p < peakCount; p++) {
        peaks.push({
          cx: w * (0.1 + rng() * 0.8),
          peakH: h * (0.1 + rng() * 0.15) * (1 - i * 0.08),
          width: h * (0.6 + rng() * 0.6),
        });
      }
      for (let x = -2; x <= w + 2; x += 2) {
        let y = baseY;
        for (const p of peaks) {
          const dist = Math.abs(x - p.cx);
          if (dist < p.width) {
            const rise = (1 - dist / p.width);
            const sharpness = 1.3 + rng() * 0.3;
            const peakY = Math.pow(rise, sharpness) * p.peakH;
            y = Math.min(y, baseY - peakY);
          }
        }
        const micro = fbm((x / h) * 1.5 + i * 2.3 + offset, 3) * h * 0.008;
        ctx.lineTo(x, y + micro);
      }
      ctx.lineTo(w + 2, h + 2);
      ctx.closePath();
      ctx.fillStyle = getColor(pal, t * 0.8 + 0.12, inv);
      ctx.fill();
    }
  }

  function drawConcentricArcs(ctx, w, h, pal, rng, inv) {
    const maxR = h * 1.0;
    const originX = w * (0.45 + rng() * 0.1);
    const originY = h * 1.5;
    const rings = 14 + (rng() * 6 | 0);
    for (let i = rings; i >= 0; i--) {
      const t = i / rings;
      const r = maxR * t;
      ctx.beginPath();
      ctx.arc(originX, originY, r, 0, Math.PI * 2);
      ctx.closePath();
      ctx.fillStyle = getColor(pal, 0.1 + (1 - t) * 0.8, inv);
      ctx.fill();
    }
  }

  function drawDesertDunes(ctx, w, h, pal, rng, inv) {
    for (let i = 0; i < 15; i++) {
      const t = i / 15;
      ctx.beginPath();
      let x = w * rng(), y = h * (0.5 + rng() * 0.5);
      ctx.moveTo(x, y);
      for (let j = 0; j < 10; j++) {
        x += (rng() - 0.5) * w * 1;
        y += (rng() - 0.4) * h * 0.2;
        const cp1y = h * (0.5 + rng() * 0.5);
        const cp2y = h * (0.5 + rng() * 0.5);
        ctx.bezierCurveTo(w * rng(), cp1y, w * rng(), cp2y, x, y);
      }
      ctx.strokeStyle = getColor(pal, t, inv);
      ctx.lineWidth = rng() * 3;
      ctx.stroke();
    }
  }

  function drawClockOverlay(ctx, w, h, type, paletteIdx, inv) {
    const bg = getBgColor(paletteIdx, inv);
    const r = parseInt(bg.slice(1,3), 16), g = parseInt(bg.slice(3,5), 16), b = parseInt(bg.slice(5,7), 16);
    const brightness = (r * 299 + g * 587 + b * 114) / 1000;
    ctx.fillStyle = brightness > 125 ? 'rgba(0, 0, 0, 0.75)' : 'rgba(255, 255, 255, 0.9)';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';

    const now = new Date();
    const hours = String(now.getHours()).padStart(2, '0');
    const mins = String(now.getMinutes()).padStart(2, '0');
    const time = `${hours}:${mins}`;
    const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
    const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
    const dateStr = `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;

    if (type === 'desktop') {
      ctx.font = '300 11px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto';
      ctx.fillText(dateStr, w / 2, h * 0.20);
      ctx.font = '600 42px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto';
      ctx.fillText(time, w / 2, h * 0.30);
    } else if (type === 'mobile') {
      ctx.font = '500 7px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto';
      ctx.fillText(dateStr.toUpperCase(), w / 2, h * 0.15);
      ctx.font = '700 28px -apple-system, BlinkMacSystemFont, "SF Pro Display", Roboto';
      ctx.fillText(time, w / 2, h * 0.23);
    }
  }

  function drawPattern(ctx, w, h, patternIdx, paletteIdx, s, inv = false) {
    _seed = s;
    const rng = mulberry32(s);
    ctx.fillStyle = getBgColor(paletteIdx, inv);
    ctx.fillRect(0, 0, w, h);

    switch(PATTERNS[patternIdx]) {
      case 'flowing-hills':   drawFlowingHills(ctx, w, h, paletteIdx, rng, inv); break;
      case 'smooth-wave':     drawSmoothWave(ctx, w, h, paletteIdx, rng, inv); break;
      case 'sand-dunes':      drawSandDunes(ctx, w, h, paletteIdx, rng, inv); break;
      case 'mountains':       drawMountains(ctx, w, h, paletteIdx, rng, inv); break;
      case 'concentric-arcs': drawConcentricArcs(ctx, w, h, paletteIdx, rng, inv); break;
      case 'desert-dunes':    drawDesertDunes(ctx, w, h, paletteIdx, rng, inv); break;
    }
  }

  async function exportWallpaper(w, h, patternIdx, paletteIdx, s, inv, filename) {
    const c = document.createElement('canvas');
    c.width = w; c.height = h;
    drawPattern(c.getContext('2d'), w, h, patternIdx, paletteIdx, s, inv);

    const blob = await new Promise(resolve => c.toBlob(resolve, 'image/png'));

    if (window.__TAURI__) {
      const arrayBuffer = await blob.arrayBuffer();
      const bytes = Array.from(new Uint8Array(arrayBuffer));
      await window.__TAURI__.core.invoke('save_wallpaper', { bytes, filename });
    } else {
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      a.click();
      setTimeout(() => URL.revokeObjectURL(url), 1000);
    }
  }

  // ---- Create UI wiring ----
  let currentPattern = 0;
  let currentPalette = 0;
  let seed = Math.random() * 10000 | 0;
  let inverted = false;

  function render() {
    const dCtx = document.getElementById('previewDesktop').getContext('2d');
    const mCtx = document.getElementById('previewMobile').getContext('2d');
    drawPattern(dCtx, 640, 360, currentPattern, currentPalette, seed, inverted);
    drawPattern(mCtx, 145, 314, currentPattern, currentPalette, seed, inverted);
    drawClockOverlay(dCtx, 640, 360, 'desktop', currentPalette, inverted);
    drawClockOverlay(mCtx, 145, 314, 'mobile', currentPalette, inverted);
  }

  // Pattern grid
  const grid = document.getElementById('styleGrid');
  PATTERNS.forEach((_, i) => {
    const btn = document.createElement('button');
    btn.className = 'style-btn' + (i === currentPattern ? ' active' : '');
    btn.title = PATTERN_LABELS[i];
    const c = document.createElement('canvas');
    c.width = 120;
    c.height = 75;
    btn.appendChild(c);
    grid.appendChild(btn);
    drawPattern(c.getContext('2d'), 120, 75, i, 0, 42, false);
    btn.onclick = () => {
      currentPattern = i;
      grid.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      render();
    };
  });

  // Palette row
  const row = document.getElementById('paletteRow');
  PALETTES.forEach((pal, i) => {
    const swatch = document.createElement('button');
    swatch.className = 'palette-swatch' + (i === currentPalette ? ' active' : '');
    swatch.title = pal.name;
    swatch.style.background = pal.colors[Math.floor(pal.colors.length / 2)];
    row.appendChild(swatch);
    swatch.onclick = () => {
      currentPalette = i;
      row.querySelectorAll('.palette-swatch').forEach(b => b.classList.remove('active'));
      swatch.classList.add('active');
      render();
    };
  });

  // Mode toggle
  document.getElementById('btnDark').onclick = () => {
    inverted = false;
    document.getElementById('btnDark').classList.add('active');
    document.getElementById('btnLight').classList.remove('active');
    render();
  };

  document.getElementById('btnLight').onclick = () => {
    inverted = true;
    document.getElementById('btnLight').classList.add('active');
    document.getElementById('btnDark').classList.remove('active');
    render();
  };

  // Shuffle
  document.getElementById('btnShuffle').onclick = () => {
    seed = Math.random() * 100000 | 0;
    render();
  };

  // Download
  document.getElementById('btnDesktop').onclick = () => {
    exportWallpaper(DESKTOP_W, DESKTOP_H, currentPattern, currentPalette, seed, inverted, 'walls-desktop-4k.png');
  };

  document.getElementById('btnMobile').onclick = () => {
    exportWallpaper(MOBILE_W, MOBILE_H, currentPattern, currentPalette, seed, inverted, 'walls-iphone.png');
  };

  // Apply as wallpaper
  document.getElementById('btnApply').addEventListener('click', async () => {
    try {
      if (!window.__TAURI__) {
        alert('This feature is only available in the desktop app.');
        return;
      }
      const btn = document.getElementById('btnApply');
      btn.textContent = 'Applying...';
      btn.disabled = true;

      const c = document.createElement('canvas');
      c.width = DESKTOP_W;
      c.height = DESKTOP_H;
      drawPattern(c.getContext('2d'), DESKTOP_W, DESKTOP_H, currentPattern, currentPalette, seed, inverted);
      const blob = await new Promise(resolve => c.toBlob(resolve, 'image/png'));
      const arrayBuffer = await blob.arrayBuffer();
      const bytes = Array.from(new Uint8Array(arrayBuffer));
      await window.__TAURI__.core.invoke('set_wallpaper', {
        bytes,
        filename: `walls-custom-${seed}.png`,
      });

      await new Promise(r => setTimeout(r, 5000));
      btn.textContent = 'Applied!';
      setTimeout(() => {
        btn.textContent = 'Set Wallpaper';
        btn.disabled = false;
      }, 2000);
    } catch (err) {
      alert('Error: ' + err);
      const btn = document.getElementById('btnApply');
      btn.textContent = 'Set Wallpaper';
      btn.disabled = false;
    }
  });

  render();
})();
</script>
</body>
</html>
