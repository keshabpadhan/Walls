<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WALLS</title>
  <link rel="icon" type="image/svg+xml"
    href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 32 32'><rect width='32' height='32' rx='8' fill='%23111'/><text x='16' y='21' text-anchor='middle' font-family='-apple-system,Helvetica,Arial,sans-serif' font-size='13' font-weight='600' fill='white'>WLS</text></svg>">
  <link rel="stylesheet" href="styles.css">
  <style>
    .nav-brand {
      position: absolute;
      left: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      font-family: 'SF Pro Display', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 8px;
      /* optical centering — offset the trailing letter-spacing on the right */
      padding-left: 8px;
      color: var(--text);
      text-decoration: none;
      -webkit-app-region: no-drag;
      transition: opacity var(--transition);
      white-space: nowrap;
    }

    .nav-brand:hover {
      opacity: 0.7;
    }

    .create-layout {
      display: grid;
      grid-template-columns: 1fr 300px;
      gap: 24px;
      padding: 24px;
      padding-top: 68px;
      height: 100vh;
    }

    .preview-area {
      display: flex;
      flex-direction: column;
      gap: 16px;
      align-items: center;
      justify-content: center;
    }

    .preview-container {
      display: flex;
      gap: 20px;
      align-items: flex-end;
      justify-content: center;
    }

    .preview-wrap {
      position: relative;
    }

    .preview-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1px;
      color: var(--text-muted);
      text-align: center;
      margin-bottom: 8px;
      text-transform: uppercase;
    }

    .preview-wrap canvas {
      border-radius: 16px;
      border: 2px solid var(--border);
      display: block;
      box-shadow: 0 2px 12px rgba(0, 0, 0, 0.15);
    }

    .controls-panel {
      display: flex;
      flex-direction: column;
      gap: 20px;
      overflow-y: auto;
      padding-right: 4px;
      padding-top: 44px;
    }

    .control-group {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .control-label {
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 1.5px;
      color: var(--text-muted);
      text-transform: uppercase;
    }

    .style-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 8px;
    }

    .style-btn {
      background: var(--bg-card);
      border: 2px solid var(--border);
      border-radius: var(--radius);
      padding: 4px;
      cursor: pointer;
      transition: var(--transition);
      overflow: hidden;
    }

    .style-btn canvas {
      width: 100%;
      aspect-ratio: 16 / 10;
      border-radius: 10px;
      display: block;
    }

    .style-btn:hover {
      border-color: var(--text-muted);
    }

    .style-btn.active {
      border-color: var(--text);
    }

    .palette-row {
      display: flex;
      gap: 6px;
      flex-wrap: wrap;
    }

    .palette-swatch {
      width: 36px;
      height: 36px;
      border-radius: 50px;
      border: 2px solid var(--border);
      cursor: pointer;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      transition: var(--transition);
      padding: 0;
      background: none;
    }

    .palette-swatch span {
      flex: 1;
      display: block;
    }

    .palette-swatch:hover {
      border-color: var(--text-muted);
    }

    .palette-swatch.active {
      border-color: var(--text);
    }

    .mode-toggle {
      display: flex;
      gap: 6px;
    }

    .mode-btn {
      flex: 1;
      padding: 10px;
      border-radius: 50px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text-muted);
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: var(--transition);
    }

    .mode-btn:hover {
      border-color: var(--text-muted);
      color: var(--text);
    }

    .mode-btn.active {
      background: var(--text);
      color: var(--bg);
      border-color: var(--text);
    }

    .mode-icon {
      width: 14px;
      height: 14px;
      border-radius: 50%;
    }

    .mode-icon-dark {
      background: #222;
      border: 1px solid #555;
    }

    .mode-icon-light {
      background: #eee;
      border: 1px solid #ccc;
    }

    .btn-shuffle {
      width: 100%;
      padding: 12px;
      border-radius: 50px;
      border: 1px solid var(--border);
      background: var(--bg-card);
      color: var(--text);
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 1px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      transition: var(--transition);
    }

    .btn-shuffle:hover {
      background: var(--bg-hover);
      border-color: var(--text-muted);
    }

    .export-group {
      display: flex;
      flex-direction: column;
      gap: 8px;
      margin-top: auto;
      padding-top: 12px;
      border-top: 1px solid var(--border);
    }

    .btn-export {
      width: 100%;
      padding: 12px;
      border-radius: 50px;
      border: none;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: var(--transition);
    }

    .btn-desktop {
      background: var(--text);
      color: var(--bg);
    }

    .btn-desktop:hover {
      opacity: 0.85;
    }

    .btn-mobile {
      background: var(--bg-card);
      color: var(--text);
      border: 1px solid var(--border) !important;
    }

    .btn-mobile:hover {
      background: var(--bg-hover);
    }

    .btn-apply {
      width: 100%;
      padding: 10px 20px;
      border-radius: 50px;
      border: none;
      background: var(--text);
      color: var(--bg);
      font-size: 13px;
      font-weight: 600;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
      transition: var(--transition);
      white-space: nowrap;
    }

    .btn-apply:hover {
      opacity: 0.85;
    }

    .btn-apply:disabled {
      opacity: 0.6;
      cursor: default;
    }

    .size-hint {
      font-size: 11px;
      color: var(--text-muted);
      text-align: center;
      margin-top: -4px;
    }

    /* ── Mobile / touch layout ── */
    @media (max-width: 720px) {

      /* Allow the page to grow and scroll instead of being locked to one screen. */
      .create-layout {
        display: flex;
        flex-direction: column;
        gap: 20px;
        padding: 16px;
        padding-top: 72px;
        height: auto;
        min-height: 100vh;
      }

      /* Previews sit on top, controls below. Nothing may exceed the viewport. */
      .preview-area {
        gap: 12px;
        width: 100%;
        max-width: 100%;
      }

      .preview-container {
        gap: 14px;
        width: 100%;
        max-width: 100%;
        justify-content: center;
      }

      /* On a phone we only show the phone preview (the user is on mobile).
         The desktop wallpaper is still fully exportable via "Download Desktop".
         Hide the whole desktop wrap so its "DESKTOP" label goes too. */
      .preview-container .preview-wrap:first-child {
        display: none;
      }

      /* Phone preview: scaled up to read nicely, centered. The canvas buffer
         (export resolution) is unchanged; only the on-screen size grows. */
      #previewMobile {
        width: auto;
        height: 300px;
        max-width: 100%;
      }

      /* Controls become a full-width stacked panel that scrolls with the page. */
      .controls-panel {
        width: 100%;
        max-width: 100%;
        overflow-y: visible;
        padding-right: 0;
        padding-top: 0;
        gap: 22px;
      }

      /* Bigger tap targets for pattern thumbnails. */
      .style-grid {
        gap: 10px;
      }

      /* Roomier, easier-to-tap palette swatches. */
      .palette-row {
        gap: 10px;
      }

      .palette-swatch {
        width: 44px;
        height: 44px;
      }

      /* Comfortable touch height on the primary actions. */
      .mode-btn,
      .btn-shuffle,
      .btn-export,
      .btn-apply {
        padding: 14px;
        font-size: 14px;
      }

      /* On mobile the export separator/auto-margin isn't needed. */
      .export-group {
        margin-top: 4px;
      }

      /* Slightly smaller wordmark so it never crowds the theme toggle. */
      .nav-brand {
        position: absolute;
        left: 16px;
        top: 50%;
        transform: translateY(-50%);
        font-size: 17px;
        letter-spacing: 5px;
        padding-left: 5px;
      }
    }

    /* Very narrow phones: trim the preview height so controls stay reachable. */
    @media (max-width: 380px) {
      #previewMobile {
        height: 260px;
      }
    }

    /* On touch devices, drop hover-only styling that can "stick" after a tap. */
    @media (hover: none) {
      .style-btn:hover {
        border-color: var(--border);
      }

      .palette-swatch:hover {
        border-color: var(--border);
      }

      .mode-btn:hover {
        border-color: var(--border);
        color: var(--text-muted);
      }

      .btn-shuffle:hover {
        background: var(--bg-card);
        border-color: var(--border);
      }

      .nav-brand:hover {
        opacity: 1;
      }
    }
  </style>
</head>

  <script>
    function applyTheme(isDark) {
      const r = document.documentElement.style;
      if (isDark) {
        r.setProperty('--bg', '#0a0a0a');
        r.setProperty('--bg-card', '#151515');
        r.setProperty('--bg-hover', '#1e1e1e');
        r.setProperty('--bg-nav', 'rgba(15,15,15,0.85)');
        r.setProperty('--text', '#f0f0f0');
        r.setProperty('--text-muted', '#888');
        r.setProperty('--border', '#222');
      } else {
        r.setProperty('--bg', '#f0f0f0');
        r.setProperty('--bg-card', '#ffffff');
        r.setProperty('--bg-hover', '#e4e4e4');
        r.setProperty('--bg-nav', 'rgba(240,240,240,0.85)');
        r.setProperty('--text', '#111');
        r.setProperty('--text-muted', '#666');
        r.setProperty('--border', '#ddd');
      }
    }

    const saved = localStorage.getItem('walls-theme') || 'dark';
    applyTheme(saved === 'dark');
    if (saved === 'light') {
      document.getElementById('themeLight').classList.add('active');
      document.getElementById('themeDark').classList.remove('active');
    }

    document.getElementById('themeDark').onclick = () => {
      localStorage.setItem('walls-theme', 'dark');
      applyTheme(true);
      document.getElementById('themeDark').classList.add('active');
      document.getElementById('themeLight').classList.remove('active');
    };

    document.getElementById('themeLight').onclick = () => {
      localStorage.setItem('walls-theme', 'light');
      applyTheme(false);
      document.getElementById('themeLight').classList.add('active');
      document.getElementById('themeDark').classList.remove('active');
    };
  </script>

      const PATTERNS = ['flowing-hills', 'smooth-wave', 'sand-dunes', 'mountains', 'concentric-arcs', 'desert-dunes'/*, 'layered-ridges', 'gradient-orbs', 'silk-ribbon', 'soft-blobs', 'gradient-waves', 'liquid-swirl'*/];
      const PATTERN_LABELS = ['Hills', 'Wave', 'Dunes', 'Mountains', 'Arcs', 'Scribble'/*, 'Ridges', 'Orbs', 'Silk', 'Blobs', 'Gradient', 'Liquid'*/];

      let _seed = 0;

      function mulberry32(a) {
        return function () {
          a |= 0; a = a + 0x6D2B79F5 | 0;
          var t = Math.imul(a ^ a >>> 15, 1 | a);
          t = t + Math.imul(t ^ t >>> 7, 61 | t) ^ t;
          return ((t ^ t >>> 14) >>> 0) / 4294967296;
        }
      }

      function noise(x) {
        const ix = Math.floor(x);
        const fx = x - ix;
        const t = fx * fx * (3 - 2 * fx);
        const seedA = Math.sin(ix * 127.1 + _seed * 0.01) * 43758.5453;
        const seedB = Math.sin((ix + 1) * 127.1 + _seed * 0.01) * 43758.5453;
        const a = seedA - Math.floor(seedA);
        const b = seedB - Math.floor(seedB);
        return a + (b - a) * t;
      }

      function fbm(x, octaves = 4) {
        let val = 0, amp = 0.5, freq = 1;
        for (let i = 0; i < octaves; i++) {
          val += amp * noise(x * freq);
          amp *= 0.5;
          freq *= 2.1;
        }
        return val;
      }

      function lerpColor(c1, c2, t) {
        const r1 = parseInt(c1.slice(1, 3), 16), g1 = parseInt(c1.slice(3, 5), 16), b1 = parseInt(c1.slice(5, 7), 16);
        const r2 = parseInt(c2.slice(1, 3), 16), g2 = parseInt(c2.slice(3, 5), 16), b2 = parseInt(c2.slice(5, 7), 16);
        return `rgb(${Math.round(r1 + (r2 - r1) * t)},${Math.round(g1 + (g2 - g1) * t)},${Math.round(b1 + (b2 - b1) * t)})`;
      }

      function getColor(palette, t, inv) {
        const colors = PALETTES[palette].colors;
        const ct = inv ? 1 - t : t;
        const idx = ct * (colors.length - 1);
        const i = Math.floor(idx);
        const f = idx - i;
        if (i >= colors.length - 1) return colors[colors.length - 1];
        if (i < 0) return colors[0];
        return lerpColor(colors[i], colors[i + 1], f);
      }

      function getBgColor(palette, inv) {
        const colors = PALETTES[palette].colors;
        return inv ? colors[colors.length - 1] : colors[0];
      }

      function drawPineTree(ctx, x, bottomY, width, height, rng) {
        ctx.save();
        ctx.beginPath();
        ctx.moveTo(x - width * 0.08, bottomY);
        ctx.lineTo(x - width * 0.08, bottomY - height * 0.15);
        ctx.lineTo(x + width * 0.08, bottomY - height * 0.15);
        ctx.lineTo(x + width * 0.08, bottomY);
        ctx.fill();

        const segments = 30;
        for (let i = 0; i < segments; i++) {
          const t = i / (segments - 1);
          const segHeight = height * 1;
          const topY = bottomY - height + (segHeight * t * 0.45);
          const currBottomY = bottomY - height + (segHeight * (t + 0.22));
          const currWidth = width * (0.25 + t * 0.75);
          ctx.beginPath();
          ctx.moveTo(x, topY);
          const jitterL = (rng() - 0.5) * (width * 0.08);
          const jitterR = (rng() - 0.5) * (width * 0.08);
          ctx.lineTo(x - currWidth / 2 + jitterL, currBottomY);
          ctx.lineTo(x + currWidth / 2 + jitterR, currBottomY);
          ctx.closePath();
          ctx.fill();
        }
        ctx.restore();
      }

      function drawFlowingHills(ctx, w, h, pal, rng, inv) {
        const layers = 5;
        const isDesktop = w > h;
        for (let i = 0; i < layers; i++) {
          const t = (i + 1) / layers;
          const spacingFactor = isDesktop ? 0.40 : 0.33;
          const baseY = h * (0.5 + (i / layers) * spacingFactor);
          ctx.fillStyle = getColor(pal, t * 0.85 + 0.1, inv);
          ctx.beginPath();
          ctx.moveTo(0, h);
          let ridgePoints = [];
          const geometryStep = Math.max(4, Math.round(w / 120));
          for (let x = 0; x <= w + geometryStep; x += geometryStep) {
            const nx = x / w;
            let y;
            if (i < 2) {
              const mountainAmplitude = isDesktop ? 0.32 : 0.12;
              const mountainFreq = isDesktop ? 4.5 : 2.5;
              y = baseY + fbm(nx * mountainFreq + i * 4.5, 10) * h * mountainAmplitude - (isDesktop ? h * 0.12 : h * 0.05);
            } else {
              const hillAmplitude = isDesktop ? 0.16 : 0.06;
              const hillFreq = isDesktop ? 2.5 : 1.5;
              y = baseY + fbm(nx * hillFreq + i * 2.1, 8) * h * hillAmplitude - (isDesktop ? h * 0.01 : h * 0.02);
            }
            ridgePoints.push({ x, y });
            ctx.lineTo(x, y);
          }
          ctx.lineTo(w, h);
          ctx.lineTo(0, h);
          ctx.closePath();
          ctx.fill();

          if (i >= 1) {
            let baseTreeWidth, baseTreeHeight;
            if (isDesktop) {
              baseTreeWidth = h * (0.045 + i * 0.004);
              baseTreeHeight = baseTreeWidth * (1 + rng() * 0.2);
            } else {
              baseTreeWidth = w * (0.12 + i * 0.004);
              baseTreeHeight = baseTreeWidth * (1 + rng() * 0.2);
            }
            const stepX = baseTreeWidth * 0.35;
            for (let x = 0; x <= w; x += stepX) {
              const pct = x / w;
              const ptIndex = Math.floor(pct * (ridgePoints.length - 1));
              const pt = ridgePoints[ptIndex] || ridgePoints[ridgePoints.length - 1];
              const rowsDown = isDesktop
                ? (i === 1 ? 3 : 5 + (layers - i))
                : (i === 1 ? 1 : 2 + (layers - i));
              for (let row = 0; row < rowsDown; row++) {
                const yOffset = row * (baseTreeHeight * 0.22);
                const currentBottomY = pt.y + yOffset;
                if (currentBottomY > h + 20) continue;
                const scale = isDesktop ? (0.65 + rng() * 1.1) : (0.8 + rng() * 0.4);
                const currentWidth = baseTreeWidth * (isDesktop ? Math.min(scale, 1.1) : scale);
                const currentHeight = baseTreeHeight * scale;
                const currentX = x + (rng() - 0.5) * (stepX * 0.5);
                drawPineTree(ctx, currentX, currentBottomY, currentWidth, currentHeight, rng);
              }
            }
          }
        }
      }

      function drawSmoothWave(ctx, w, h, pal, rng, inv) {
        const layers = 8 + (rng() * 5 | 0);
        const centerX = w * (0.45 + rng() * 0.1);
        const baseY = h * (0.75 + rng() * 0.08);
        for (let i = layers; i >= 0; i--) {
          const t = i / layers;
          const spread = h * (0.8 + t * 1.8);
          const peakH = h * (0.05 + t * 0.3);
          const skew = rng() * 0.2 - 0.10;
          ctx.beginPath();
          ctx.moveTo(0, h);
          ctx.lineTo(0, baseY + peakH * 0.5);
          const steps = 120;
          for (let s = 0; s <= steps; s++) {
            const st = s / steps;
            const x = st * w;
            const dist = (x - centerX) / spread;
            const bell = Math.exp(-dist * dist * 0.4);
            const asymmetry = 1 + skew * dist;
            const wave = bell * peakH * asymmetry;
            const micro = fbm((x / h) * 2 + i * 1.4, 3) * h * 0.008;
            const y = baseY - wave + micro;
            ctx.lineTo(x, y);
          }
          ctx.lineTo(w, h);
          ctx.closePath();
          ctx.fillStyle = getColor(pal, 0.1 + (1 - t) * 0.8, inv);
          ctx.fill();
        }
      }

      function drawSandDunes(ctx, w, h, pal, rng, inv) {
        const layers = 7 + (rng() * 5 | 0);
        for (let i = 0; i < layers; i++) {
          const t = (i + 1) / layers;
          const baseY = h * (0.55 + t * 0.35);
          const freq = 0.5 + rng() * 0.8;
          const phase = rng() * 10;
          ctx.beginPath();
          for (let x = 0; x <= w; x += 2) {
            const nx = x / h;
            const wave = Math.sin(nx * Math.PI * freq + phase) * h * 0.05;
            const n = fbm(nx * 0.8 + i * 2.1, 3) * h * 0.05;
            const y = baseY + wave + n;
            if (x === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          ctx.lineTo(w, h);
          ctx.lineTo(0, h);
          ctx.closePath();
          ctx.fillStyle = getColor(pal, t * 0.8 + 0.15, inv);
          ctx.fill();
        }
      }

      function drawMountains(ctx, w, h, pal, rng, inv) {
        const layers = 5 + (rng() * 3 | 0);
        for (let i = 0; i < layers; i++) {
          const t = (i + 1) / layers;
          const baseY = h * (0.55 + t * 0.35);
          const peakCount = 2 + (rng() * 2 | 0);
          const offset = rng() * 50;
          ctx.beginPath();
          ctx.moveTo(-2, h + 2);
          const peaks = [];
          for (let p = 0; p < peakCount; p++) {
            peaks.push({
              cx: w * (0.1 + rng() * 0.8),
              peakH: h * (0.1 + rng() * 0.15) * (1 - i * 0.08),
              width: h * (0.6 + rng() * 0.6),
            });
          }
          for (let x = -2; x <= w + 2; x += 2) {
            let y = baseY;
            for (const p of peaks) {
              const dist = Math.abs(x - p.cx);
              if (dist < p.width) {
                const rise = (1 - dist / p.width);
                const sharpness = 1.3 + rng() * 0.3;
                const peakY = Math.pow(rise, sharpness) * p.peakH;
                y = Math.min(y, baseY - peakY);
              }
            }
            const micro = fbm((x / h) * 1.5 + i * 2.3 + offset, 3) * h * 0.008;
            ctx.lineTo(x, y + micro);
          }
          ctx.lineTo(w + 2, h + 2);
          ctx.closePath();
          ctx.fillStyle = getColor(pal, t * 0.8 + 0.12, inv);
          ctx.fill();
        }
      }

      function drawConcentricArcs(ctx, w, h, pal, rng, inv) {
        const maxR = h * 1.0;
        const originX = w * (0.45 + rng() * 0.1);
        const originY = h * 1.5;
        const rings = 14 + (rng() * 6 | 0);
        for (let i = rings; i >= 0; i--) {
          const t = i / rings;
          const r = maxR * t;
          ctx.beginPath();
          ctx.arc(originX, originY, r, 0, Math.PI * 2);
          ctx.closePath();
          ctx.fillStyle = getColor(pal, 0.1 + (1 - t) * 0.8, inv);
          ctx.fill();
        }
      }

      function drawDesertDunes(ctx, w, h, pal, rng, inv) {
        for (let i = 0; i < 15; i++) {
          const t = i / 15;
          ctx.beginPath();
          let x = w * rng(), y = h * (0.5 + rng() * 0.5);
          ctx.moveTo(x, y);
          for (let j = 0; j < 10; j++) {
            x += (rng() - 0.5) * w * 1;
            y += (rng() - 0.4) * h * 0.2;
            const cp1y = h * (0.5 + rng() * 0.5);
            const cp2y = h * (0.5 + rng() * 0.5);
            ctx.bezierCurveTo(w * rng(), cp1y, w * rng(), cp2y, x, y);
          }
          ctx.strokeStyle = getColor(pal, t, inv);
          ctx.lineWidth = rng() * 3;
          ctx.stroke();
        }
      }

      // ── Helpers for the soft, gradient-lit aesthetic ──

      // Parse a "#rrggbb" or "rgb(r,g,b)" string to {r,g,b}.
      function toRGB(str) {
        if (str[0] === '#') {
          return { r: parseInt(str.slice(1, 3), 16), g: parseInt(str.slice(3, 5), 16), b: parseInt(str.slice(5, 7), 16) };
        }
        const m = str.match(/(\d+)/g);
        return { r: +m[0], g: +m[1], b: +m[2] };
      }

      // getColor(...) can return either "#rrggbb" or "rgb(...)". Wrap it into an rgba().
      function colorA(pal, t, inv, a) {
        const c = toRGB(getColor(pal, t, inv));
        return `rgba(${c.r},${c.g},${c.b},${a})`;
      }

      function drawLayeredRidges(ctx, w, h, pal, rng, inv) {
        const layers = 10 + (rng() * 6 | 0);
        for (let i = 0; i < layers; i++) {
          const t = (i + 1) / layers;
          const baseY = h * (0.15 + t * 0.8);
          const amp = h * (0.03 + (1 - t) * 0.10);
          const freq = 1.5 + rng() * 2.5;
          const phase = rng() * 10;
          // Vertical gradient across the band gives each ridge soft top-lighting.
          const g = ctx.createLinearGradient(0, baseY - amp, 0, h);
          g.addColorStop(0, getColor(pal, 0.15 + t * 0.8, inv));
          g.addColorStop(1, getColor(pal, 0.08 + t * 0.7, inv));
          ctx.beginPath();
          ctx.moveTo(0, h);
          for (let x = 0; x <= w; x += 3) {
            const nx = x / w;
            const y = baseY + Math.sin(nx * Math.PI * freq + phase) * amp + fbm(nx * 2 + i, 4) * h * 0.03;
            ctx.lineTo(x, y);
          }
          ctx.lineTo(w, h);
          ctx.closePath();
          ctx.fillStyle = g;
          ctx.fill();
        }
      }

      // Large overlapping circles, each filled with a radial gradient so it reads
      // as a soft-lit disc — like the reference "orbs" wallpaper.
      function drawGradientOrbs(ctx, w, h, pal, rng, inv) {
        const count = 3 + (rng() * 3 | 0);
        const orbs = [];
        for (let i = 0; i < count; i++) {
          orbs.push({
            x: w * (0.15 + rng() * 0.7),
            y: h * (0.15 + rng() * 0.7),
            r: Math.min(w, h) * (0.28 + rng() * 0.35),
            t: 0.35 + rng() * 0.5,
            // light comes from a consistent direction (upper-right)
          });
        }
        for (const o of orbs) {
          const lx = o.x + o.r * 0.35;
          const ly = o.y - o.r * 0.35;
          const g = ctx.createRadialGradient(lx, ly, o.r * 0.05, o.x, o.y, o.r);
          g.addColorStop(0, getColor(pal, Math.min(1, o.t + 0.35), inv));
          g.addColorStop(0.55, getColor(pal, o.t, inv));
          g.addColorStop(1, getColor(pal, Math.max(0, o.t - 0.28), inv));
          ctx.beginPath();
          ctx.arc(o.x, o.y, o.r, 0, Math.PI * 2);
          ctx.fillStyle = g;
          ctx.fill();
        }
      }

      // Stacked flowing ribbons with a bright specular streak — the glossy
      // "silk / 3D ribbon" look from the first reference image.
      function drawSilkRibbon(ctx, w, h, pal, rng, inv) {
        const bands = 16 + (rng() * 10 | 0);
        const cx = w * (0.3 + rng() * 0.4);
        const cy = h * (0.35 + rng() * 0.3);
        const baseRot = rng() * Math.PI;
        for (let i = 0; i < bands; i++) {
          const t = i / bands;
          const spread = Math.min(w, h) * (0.12 + t * 0.55);
          const thick = Math.min(w, h) * (0.015 + rng() * 0.02);
          const rot = baseRot + t * 1.6 + Math.sin(t * 6) * 0.25;
          ctx.save();
          ctx.translate(cx, cy);
          ctx.rotate(rot);
          // brightness peaks mid-stack to fake a specular highlight
          const light = 1 - Math.abs(t - 0.5) * 1.4;
          const shade = 0.25 + t * 0.4;
          const g = ctx.createLinearGradient(-spread, 0, spread, 0);
          g.addColorStop(0, colorA(pal, Math.max(0, shade - 0.15), inv, 0.9));
          g.addColorStop(0.5, getColor(pal, Math.min(1, shade + light * 0.5), inv));
          g.addColorStop(1, colorA(pal, Math.max(0, shade - 0.1), inv, 0.9));
          ctx.beginPath();
          ctx.ellipse(0, i * thick * 1.6 - bands * thick * 0.8, spread, thick, 0, 0, Math.PI * 2);
          ctx.fillStyle = g;
          ctx.fill();
          ctx.restore();
        }
      }

      // Big, heavily-feathered blobs blended together — the dreamy blurred-gradient
      // look. Uses shadowBlur to feather each shape.
      function drawSoftBlobs(ctx, w, h, pal, rng, inv) {
        const count = 4 + (rng() * 3 | 0);
        ctx.save();
        for (let i = 0; i < count; i++) {
          const t = 0.3 + rng() * 0.6;
          const x = w * (0.1 + rng() * 0.8);
          const y = h * (0.1 + rng() * 0.8);
          const r = Math.min(w, h) * (0.25 + rng() * 0.35);
          const col = getColor(pal, t, inv);
          const g = ctx.createRadialGradient(x, y, 0, x, y, r);
          g.addColorStop(0, colorA(pal, t, inv, 0.95));
          g.addColorStop(1, colorA(pal, t, inv, 0));
          ctx.shadowColor = col;
          ctx.shadowBlur = Math.min(w, h) * 0.12;
          ctx.beginPath();
          ctx.arc(x, y, r, 0, Math.PI * 2);
          ctx.fillStyle = g;
          ctx.fill();
        }
        ctx.restore();
      }

      // Smooth horizontal wave layers, each a vertical gradient — the soft
      // gradient-lit landscape look (like the purple reference).
      function drawGradientWaves(ctx, w, h, pal, rng, inv) {
        const layers = 6 + (rng() * 4 | 0);
        const glowX = w * (0.3 + rng() * 0.4);
        for (let i = 0; i < layers; i++) {
          const t = (i + 1) / layers;
          const baseY = h * (0.25 + t * 0.62);
          const amp = h * (0.05 + rng() * 0.06);
          const freq = 0.8 + rng() * 1.6;
          const phase = rng() * 10;
          const g = ctx.createLinearGradient(0, baseY - amp * 2, 0, h);
          g.addColorStop(0, getColor(pal, 0.2 + t * 0.75, inv));
          g.addColorStop(1, getColor(pal, 0.1 + t * 0.55, inv));
          ctx.beginPath();
          ctx.moveTo(0, h);
          let ridge = [];
          for (let x = 0; x <= w; x += 3) {
            const nx = x / w;
            const y = baseY + Math.sin(nx * Math.PI * freq + phase) * amp + fbm(nx * 1.5 + i * 1.3, 4) * h * 0.03;
            ridge.push({ x, y });
            ctx.lineTo(x, y);
          }
          ctx.lineTo(w, h);
          ctx.closePath();
          ctx.fillStyle = g;
          ctx.fill();

          // soft glow highlight riding the crest of the front-most layers
          if (i >= layers - 3) {
            ctx.save();
            ctx.globalCompositeOperation = 'lighter';
            const grad = ctx.createRadialGradient(glowX, baseY, 0, glowX, baseY, w * 0.4);
            grad.addColorStop(0, colorA(pal, 0.9, inv, 0.10));
            grad.addColorStop(1, colorA(pal, 0.9, inv, 0));
            ctx.beginPath();
            ctx.moveTo(0, h);
            for (const p of ridge) ctx.lineTo(p.x, p.y);
            ctx.lineTo(w, h);
            ctx.closePath();
            ctx.fillStyle = grad;
            ctx.fill();
            ctx.restore();
          }
        }
      }

      // Flowing marbled swirl of feathered curved strokes — the liquid/marble look.
      function drawLiquidSwirl(ctx, w, h, pal, rng, inv) {
        ctx.save();
        ctx.lineCap = 'round';
        const strokes = 26 + (rng() * 20 | 0);
        const cx = w * (0.4 + rng() * 0.2);
        const cy = h * (0.4 + rng() * 0.2);
        for (let i = 0; i < strokes; i++) {
          const t = i / strokes;
          const startA = rng() * Math.PI * 2;
          const radius = Math.min(w, h) * (0.1 + t * 0.6);
          const len = 1.5 + rng() * 2.5;
          const cxx = cx + Math.cos(startA) * radius * 0.3;
          const cyy = cy + Math.sin(startA) * radius * 0.3;
          ctx.beginPath();
          const steps = 40;
          for (let s = 0; s <= steps; s++) {
            const st = s / steps;
            const a = startA + st * len;
            const rr = radius * (1 - st * 0.3) + fbm(st * 3 + i, 3) * radius * 0.2;
            const x = cxx + Math.cos(a) * rr;
            const y = cyy + Math.sin(a) * rr * 0.7;
            if (s === 0) ctx.moveTo(x, y);
            else ctx.lineTo(x, y);
          }
          ctx.strokeStyle = colorA(pal, 0.15 + t * 0.8, inv, 0.5);
          ctx.lineWidth = Math.min(w, h) * (0.01 + rng() * 0.03);
          ctx.shadowColor = getColor(pal, 0.15 + t * 0.8, inv);
          ctx.shadowBlur = Math.min(w, h) * 0.02;
          ctx.stroke();
        }
        ctx.restore();
      }

      function drawClockOverlay(ctx, w, h, type, paletteIdx, inv) {
        const bg = getBgColor(paletteIdx, inv);
        const r = parseInt(bg.slice(1, 3), 16), g = parseInt(bg.slice(3, 5), 16), b = parseInt(bg.slice(5, 7), 16);
        const brightness = (r * 299 + g * 587 + b * 114) / 1000;
        ctx.fillStyle = brightness > 125 ? 'rgba(0, 0, 0, 0.75)' : 'rgba(255, 255, 255, 0.9)';
        ctx.textAlign = 'center';
        ctx.textBaseline = 'middle';

        const now = new Date();
        const hours = String(now.getHours()).padStart(2, '0');
        const mins = String(now.getMinutes()).padStart(2, '0');
        const time = `${hours}:${mins}`;
        const days = ['Sunday', 'Monday', 'Tuesday', 'Wednesday', 'Thursday', 'Friday', 'Saturday'];
        const months = ['January', 'February', 'March', 'April', 'May', 'June', 'July', 'August', 'September', 'October', 'November', 'December'];
        const dateStr = `${days[now.getDay()]}, ${months[now.getMonth()]} ${now.getDate()}`;

        if (type === 'desktop') {
          ctx.font = '300 11px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto';
          ctx.fillText(dateStr, w / 2, h * 0.20);
          ctx.font = '600 42px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto';
          ctx.fillText(time, w / 2, h * 0.30);
        } else if (type === 'mobile') {
          ctx.font = '500 7px -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto';
          ctx.fillText(dateStr.toUpperCase(), w / 2, h * 0.15);
          ctx.font = '700 28px -apple-system, BlinkMacSystemFont, "SF Pro Display", Roboto';
          ctx.fillText(time, w / 2, h * 0.23);
        }
      }

      function drawPattern(ctx, w, h, patternIdx, paletteIdx, s, inv = false) {
        _seed = s;
        const rng = mulberry32(s);
        ctx.fillStyle = getBgColor(paletteIdx, inv);
        ctx.fillRect(0, 0, w, h);

        switch (PATTERNS[patternIdx]) {
          case 'flowing-hills': drawFlowingHills(ctx, w, h, paletteIdx, rng, inv); break;
          case 'smooth-wave': drawSmoothWave(ctx, w, h, paletteIdx, rng, inv); break;
          case 'sand-dunes': drawSandDunes(ctx, w, h, paletteIdx, rng, inv); break;
          case 'mountains': drawMountains(ctx, w, h, paletteIdx, rng, inv); break;
          case 'concentric-arcs': drawConcentricArcs(ctx, w, h, paletteIdx, rng, inv); break;
          case 'desert-dunes': drawDesertDunes(ctx, w, h, paletteIdx, rng, inv); break;
          case 'layered-ridges': drawLayeredRidges(ctx, w, h, paletteIdx, rng, inv); break;
          case 'gradient-orbs': drawGradientOrbs(ctx, w, h, paletteIdx, rng, inv); break;
          case 'silk-ribbon': drawSilkRibbon(ctx, w, h, paletteIdx, rng, inv); break;
          case 'soft-blobs': drawSoftBlobs(ctx, w, h, paletteIdx, rng, inv); break;
          case 'gradient-waves': drawGradientWaves(ctx, w, h, paletteIdx, rng, inv); break;
          case 'liquid-swirl': drawLiquidSwirl(ctx, w, h, paletteIdx, rng, inv); break;
        }
      }

      async function exportWallpaper(w, h, patternIdx, paletteIdx, s, inv, filename) {
        const c = document.createElement('canvas');
        c.width = w; c.height = h;
        drawPattern(c.getContext('2d'), w, h, patternIdx, paletteIdx, s, inv);

        const blob = await new Promise(resolve => c.toBlob(resolve, 'image/png'));

        if (window.__TAURI__) {
          const arrayBuffer = await blob.arrayBuffer();
          const bytes = Array.from(new Uint8Array(arrayBuffer));
          await window.__TAURI__.core.invoke('save_wallpaper', { bytes, filename });
        } else {
          const url = URL.createObjectURL(blob);
          const a = document.createElement('a');
          a.href = url;
          a.download = filename;
          a.click();
          setTimeout(() => URL.revokeObjectURL(url), 1000);
        }
      }

      // ---- Create UI wiring ----
      // Start on a random pattern + palette + seed so the app opens on a fresh wallpaper each time.
      let currentPattern = Math.random() * PATTERNS.length | 0;
      let currentPalette = Math.random() * PALETTES.length | 0;
      let seed = Math.random() * 10000 | 0;
      let inverted = false;

      function render() {
        const dCtx = document.getElementById('previewDesktop').getContext('2d');
        const mCtx = document.getElementById('previewMobile').getContext('2d');
        drawPattern(dCtx, 640, 360, currentPattern, currentPalette, seed, inverted);
        drawPattern(mCtx, 145, 314, currentPattern, currentPalette, seed, inverted);
        drawClockOverlay(dCtx, 640, 360, 'desktop', currentPalette, inverted);
        drawClockOverlay(mCtx, 145, 314, 'mobile', currentPalette, inverted);
      }

      // Pattern grid
      const grid = document.getElementById('styleGrid');
      PATTERNS.forEach((_, i) => {
        const btn = document.createElement('button');
        btn.className = 'style-btn' + (i === currentPattern ? ' active' : '');
        btn.title = PATTERN_LABELS[i];
        const c = document.createElement('canvas');
        c.width = 120;
        c.height = 75;
        btn.appendChild(c);
        grid.appendChild(btn);
        drawPattern(c.getContext('2d'), 120, 75, i, 0, 42, false);
        btn.onclick = () => {
          currentPattern = i;
          grid.querySelectorAll('.style-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          render();
        };
      });

      // Palette row
      const row = document.getElementById('paletteRow');
      PALETTES.forEach((pal, i) => {
        const swatch = document.createElement('button');
        swatch.className = 'palette-swatch' + (i === currentPalette ? ' active' : '');
        swatch.title = pal.name;
        swatch.style.background = pal.colors[Math.floor(pal.colors.length / 2)];
        row.appendChild(swatch);
        swatch.onclick = () => {
          currentPalette = i;
          row.querySelectorAll('.palette-swatch').forEach(b => b.classList.remove('active'));
          swatch.classList.add('active');
          render();
        };
      });

      // Mode toggle
      document.getElementById('btnDark').onclick = () => {
        inverted = false;
        document.getElementById('btnDark').classList.add('active');
        document.getElementById('btnLight').classList.remove('active');
        render();
      };

      document.getElementById('btnLight').onclick = () => {
        inverted = true;
        document.getElementById('btnLight').classList.add('active');
        document.getElementById('btnDark').classList.remove('active');
        render();
      };

      // Shuffle
      document.getElementById('btnShuffle').onclick = () => {
        seed = Math.random() * 100000 | 0;
        render();
      };

      // Download
      document.getElementById('btnDesktop').onclick = () => {
        exportWallpaper(DESKTOP_W, DESKTOP_H, currentPattern, currentPalette, seed, inverted, 'walls-desktop-4k.png');
      };

      document.getElementById('btnMobile').onclick = () => {
        exportWallpaper(MOBILE_W, MOBILE_H, currentPattern, currentPalette, seed, inverted, 'walls-iphone.png');
      };

      // Apply as wallpaper (button is only present in the Tauri desktop build)
      const btnApply = document.getElementById('btnApply');
      if (btnApply) {
        btnApply.addEventListener('click', async () => {
          try {
            if (!window.__TAURI__) {
              alert('This feature is only available in the desktop app.');
              return;
            }
            btnApply.textContent = 'Applying...';
            btnApply.disabled = true;

            const c = document.createElement('canvas');
            c.width = DESKTOP_W;
            c.height = DESKTOP_H;
            drawPattern(c.getContext('2d'), DESKTOP_W, DESKTOP_H, currentPattern, currentPalette, seed, inverted);
            const blob = await new Promise(resolve => c.toBlob(resolve, 'image/png'));
            const arrayBuffer = await blob.arrayBuffer();
            const bytes = Array.from(new Uint8Array(arrayBuffer));
            await window.__TAURI__.core.invoke('set_wallpaper', {
              bytes,
              filename: `walls-custom-${seed}.png`,
            });

            await new Promise(r => setTimeout(r, 5000));
            btnApply.textContent = 'Applied!';
            setTimeout(() => {
              btnApply.textContent = 'Set Wallpaper';
              btnApply.disabled = false;
            }, 2000);
          } catch (err) {
            alert('Error: ' + err);
            btnApply.textContent = 'Set Wallpaper';
            btnApply.disabled = false;
          }
        });
      }

      render();
    })();
  </script>
</body>

</html>
